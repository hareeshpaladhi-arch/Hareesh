spring.application.name=material-classification

# ---- H2 database that stores the reference lookup tables ----
# File-based so data survives restarts; switch to jdbc:h2:mem:classdb for an in-memory DB
spring.datasource.url=jdbc:h2:file:./data/classdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---- Reference workbook locations ----
# Drop the original Excel files into src/main/resources/data (or an external folder,
# see classification.reference-data.external-dir) and the loader will import them
# into H2 on startup, exactly mirroring the sheets the Python script read:
#   CLASS_CLEAN_Item_Details_NIIC.xlsx -> Third_Pref / Second_Pref / First_Pref(NEW) / Last_Pref
#   IS_ALTER_WORD_ABB.xlsx             -> WORD / ALTER_WORD
#   Exclusions REVISED-08.11.22.xlsx   -> Object / Exemptions
classification.reference-data.classpath-dir=data
classification.reference-data.external-dir=
# If true, re-import the workbooks every startup even if the tables already have rows
classification.reference-data.force-reload=false

server.port=8080
